server {
    listen 80;
    server_name www.online-ordering.site;  # 如果有根域名，可加 online-ordering.site                                                                                        

    # 所有请求返回 301 永久重定向到 HTTPS 的相同地址                                                                                                                        
    return 301 https://$host$request_uri;                                                                                                                                   
}

# 2. HTTPS 服务：处理实际请求
server {
    listen 443 ssl;   # 启用 SSL 和 HTTP/2（可选）                                                                                                                          
    http2 on;
    server_name www.online-ordering.site;  # 与证书域名一致                                                                                                                 

    # SSL 证书路径（请替换为你的实际文件名）                                                                                                                                
    ssl_certificate /etc/nginx/ssl/online-ordering.site_bundle.crt;                                                                                                         
    ssl_certificate_key /etc/nginx/ssl/online-ordering.site.key;                                                                                                            

    # SSL 安全配置（推荐）
    ssl_protocols TLSv1.2 TLSv1.3;                                                                                                                                          
    #ssl_ciphers HIGH:!aNULL:!MD5;                                                                                                                                          

    # 前端静态文件目录
    root /var/deploy/frontend/dist;                                                                                                                                         
    index index.html;

    # 处理 Vue Router history 模式                                                                                                                                          
    location / {
        try_files $uri $uri/ /index.html;                                                                                                                                   
    }

    # 后端 API 代理（所有 /api 开头的请求转发到后端 8080 端口）                                                                                                             
    location /api/ {
        proxy_pass http://127.0.0.1:8080/;   # 注意最后的斜杠：将 /api/xxx 转发为 /xxx                                                                                      
        proxy_set_header Host $host;                                                                                                                                        
        proxy_set_header X-Real-IP $remote_addr;                                                                                                                            
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;                                                                                                        
    }

    # websocket转到9092端口, socketio的默认url为socket.io, 默认命名空间为/
    location /socket.io {
        proxy_pass http://127.0.0.1:9092;
        proxy_http_version 1.1;              # WebSocket 需要 HTTP/1.1
        proxy_set_header Upgrade $http_upgrade;   # 升级协议头
        proxy_set_header Connection "upgrade";    # 连接升级
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置（WebSocket 长连接）
        proxy_read_timeout 3600s;             # 1小时，根据需要调整
        proxy_connect_timeout 75s;
    }

    # 后端文件服务（保留 /file 前缀）                                                                                                                                       
    location /file/ {
        proxy_pass http://127.0.0.1:8080;   # 注意最后无斜杠：将 /file 转发为 127.0.0.1:8080/file                                                                           
        proxy_set_header Host $host;                                                                                                                                        
        proxy_set_header X-Real-IP $remote_addr;                                                                                                                            
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;                                                                                                        
    }

    # SSE 长连接代理
    location /api/sse/ {
        proxy_pass http://127.0.0.1:8080/sse/;                                                                                                                              

        # 必须禁用缓冲
        proxy_buffering off;
        proxy_cache off;

        # 关闭压缩（防止数据被截断）                                                                                                                                        
        gzip off;

        # 超时设置（SSE 需要长时间保持连接）                                                                                                                                
        proxy_read_timeout 86400s;   # 24小时                                                                                                                               
        proxy_connect_timeout 75s;                                                                                                                                          

        # 使用 HTTP/1.1 并禁用分块传输（可选）                                                                                                                              
        proxy_http_version 1.1;
        chunked_transfer_encoding off;                                                                                                                                      

        # 确保 Content-Type 正确传递                                                                                                                                        
        proxy_set_header Content-Type text/event-stream;                                                                                                                    

        # 重要：让后端知道客户端期望长连接                                                                                                                                  
        proxy_set_header Connection '';                                                                                                                                     
    }
}